name: Web Admin Release

on:
  push:
    tags:
      - "web-admin-v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target_os: linux
            target_arch: amd64
            node_version: "20"
            python_build_version: "3.11"
            manylinux_image: quay.io/pypa/manylinux2014_x86_64
          - runner: ubuntu-24.04-arm
            target_os: linux
            target_arch: arm64
            node_version: "20"
            python_build_version: "3.11"
            manylinux_image: quay.io/pypa/manylinux2014_aarch64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_build_version }}

      - name: Verify backend Python compatibility
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          for path in Path("web-admin").rglob("*.py"):
              ast.parse(path.read_text(encoding="utf-8"), filename=str(path), feature_version=(3, 9))
          print("python3.9 syntax ok")
          PY
        shell: bash

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}
          cache: npm
          cache-dependency-path: web-admin/frontend/package-lock.json

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: web-admin/frontend

      - name: Build backend bundle in manylinux2014
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            ${{ matrix.manylinux_image }} \
            /bin/bash -lc "
              /opt/python/cp311-cp311/bin/python -m pip install --upgrade pip &&
              /opt/python/cp311-cp311/bin/python -m pip install -r web-admin/backend/requirements.txt pyinstaller &&
              /opt/python/cp311-cp311/bin/python web-admin/build_backend_bundle.py --target-os ${{ matrix.target_os }} --target-arch ${{ matrix.target_arch }}
            "

      - name: Package release archive
        run: python web-admin/package_release.py --target-os ${{ matrix.target_os }} --target-arch ${{ matrix.target_arch }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-admin-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: web-admin/build/artifacts/*

  release:
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate install scripts
        run: |
          sed "s|__REPO__|${GITHUB_REPOSITORY}|g" web-admin/install.sh > install-web-admin.sh

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.tar.gz
            install-web-admin.sh
          generate_release_notes: true
