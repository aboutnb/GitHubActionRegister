name: Web Admin Release

on:
  push:
    tags:
      - "web-admin-v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: aboutnb/github-action-web-admin

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify backend Python compatibility
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          for path in Path("web-admin").rglob("*.py"):
              ast.parse(path.read_text(encoding="utf-8"), filename=str(path), feature_version=(3, 9))
          print("python3.9 syntax ok")
          PY

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./web-admin
          file: ./web-admin/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate install script
        run: |
          sed "s|__IMAGE__|${REGISTRY}/${IMAGE_NAME}:${GITHUB_REF_NAME}|g" web-admin/install.sh > install-web-admin.sh

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install-web-admin.sh
          generate_release_notes: true
