name: Web Admin Release

on:
  push:
    tags:
      - "web-admin-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Verify backend Python 3.9 compatibility
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          for path in Path("web-admin").rglob("*.py"):
              ast.parse(path.read_text(encoding="utf-8"), filename=str(path), feature_version=(3, 9))
          print("python3.9 syntax ok")
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-admin/frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: web-admin/frontend

      - name: Package web-admin only
        run: |
          tar -czf web-admin.tar.gz \
            --exclude='web-admin/backend/.env' \
            --exclude='web-admin/backend/.venv' \
            --exclude='web-admin/frontend/node_modules' \
            --exclude='web-admin/frontend/.npm-cache' \
            --exclude='web-admin/.git' \
            web-admin
          sed "s|__REPO__|${GITHUB_REPOSITORY}|g" web-admin/install.sh > install-web-admin.sh
          chmod +x install-web-admin.sh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            web-admin.tar.gz
            install-web-admin.sh
          generate_release_notes: true
