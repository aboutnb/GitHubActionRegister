name: Web Admin Release

on:
  push:
    tags:
      - "web-admin-v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: aboutnb/gh-asset-center-web

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify backend Python compatibility
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          for path in Path("web-admin").rglob("*.py"):
              ast.parse(path.read_text(encoding="utf-8"), filename=str(path), feature_version=(3, 9))
          print("python3.9 syntax ok")
          PY

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./web-admin
          file: ./web-admin/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate install script
        run: |
          sed "s|__IMAGE__|${REGISTRY}/${IMAGE_NAME}:${GITHUB_REF_NAME}|g" web-admin/install.sh > install-web-admin.sh

      - name: Generate release notes
        env:
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          cat > release-notes.md <<EOF
          # Web Admin ${RELEASE_TAG}

          面向 Linux 服务器的后台管理 Docker 发布版本，仅包含 \`web-admin\`，不包含桌面端。

          ## 本次发布包含

          - 多架构 Docker 镜像
          - 一键安装脚本 \`install-web-admin.sh\`
          - 后端与前端一体部署
          - 默认管理员首次登录强制改密

          ## 本次变更

          - 新增桌面客户端邮箱账号回传接口：\`POST /api/client/mail-accounts/push\`
          - 支持桌面端将本地导入且注册失败的邮箱回传到后台邮箱库
          - 回传邮箱会自动去重、写入同步批次、写入审计日志，并保留官方 / 小水滴收信类型
          - GitHub 账号库改为以邮箱作为唯一账号标识，导入 / 导出格式统一为 \`邮箱---密码---2FA\`
          - 新增桌面端拉取未开启 2FA 的 GitHub 账号并补开 2FA 后回写管理中心
          - 新增 GitHub 账号测活：支持手动测活、批量测活、代理池配置和半月级定时测活
          - 新增升级迁移：自动迁移旧 \`github_login\` / \`bind_email\` 数据、测活字段和同步日志动作约束

          ## Docker 镜像

          - \`${REGISTRY}/${IMAGE_NAME}:${RELEASE_TAG}\`
          - \`${REGISTRY}/${IMAGE_NAME}:latest\`

          支持架构：

          - \`linux/amd64\`
          - \`linux/arm64\`

          ## 一键部署

          首次部署推荐直接传数据库连接，安装脚本会自动生成 \`JWT\` / \`ENCRYPT\` secret：

          \`\`\`bash
          curl -fsSL https://github.com/${REPOSITORY}/releases/download/${RELEASE_TAG}/install-web-admin.sh | bash -s -- \\
            --database-url 'postgresql+psycopg://postgres:123456@127.0.0.1:5432/github_asset_center'
          \`\`\`

          如果数据库已经提前建好，建议加上：

          \`\`\`bash
          curl -fsSL https://github.com/${REPOSITORY}/releases/download/${RELEASE_TAG}/install-web-admin.sh | bash -s -- \\
            --database-url 'postgresql+psycopg://postgres:123456@127.0.0.1:5432/github_asset_center' \\
            --database-bootstrap false
          \`\`\`

          如果只想先生成配置模板：

          \`\`\`bash
          curl -fsSL https://github.com/${REPOSITORY}/releases/download/${RELEASE_TAG}/install-web-admin.sh | bash
          \`\`\`

          ## 默认行为

          - 默认管理员用户名：\`admin\`
          - 默认管理员密码：\`admin123456\`
          - 默认服务端口：\`18700\`
          - 首次一键部署时自动生成：
            - \`WEB_ADMIN_JWT_SECRET\`
            - \`WEB_ADMIN_ENCRYPT_SECRET\`
          - 默认密码登录后必须先修改密码，修改完成前其他后台接口不可访问

          ## 安装脚本会做什么

          - 创建 \`/opt/web-admin/backend/.env\`
          - 创建 \`/opt/web-admin/docker-compose.yml\`
          - 拉取对应版本 Docker 镜像
          - 使用 Docker Compose 启动容器
          - 等待健康检查通过并输出访问地址

          ## 运行要求

          - 操作系统：Linux 服务器
          - Docker
          - Docker Compose
          - PostgreSQL

          ## 访问地址

          - \`http://<server-ip>:18700\`

          ## 管理命令

          \`\`\`bash
          docker ps
          docker logs -f web-admin
          docker restart web-admin
          docker stop web-admin
          \`\`\`

          ## 说明

          - 该版本只发布 \`web-admin\`
          - 如果 GHCR 包被设置为私有，需要先执行 \`docker login ghcr.io\`
          EOF

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install-web-admin.sh
          body_path: release-notes.md
